# ========== 1. 下载Python解释器加速（uv python install） ==========
# 中科大镜像，替代官方国外源，装3.8~3.13飞快
python-install-mirror = "https://mirrors.ustc.edu.cn/github-release/astral-sh/python-build-standalone/"

# ========== 2. PyPI包镜像源（多层兜底，避免单一源失效） ==========
# default=true 代表默认优先使用
[[index]]
url = "https://pypi.tuna.tsinghua.edu.cn/simple"
default = true

# 备用源1：阿里云
[[index]]
url = "https://mirrors.aliyun.com/pypi/simple"

# 备用源2：腾讯云
[[index]]
url = "https://mirrors.cloud.tencent.com/pypi/simple"

# 备用源3：中科大
[[index]]
url = "https://pypi.mirrors.ustc.edu.cn/simple"

# 兜底官方源（网络异常时降级）
[[index]]
url = "https://pypi.org/simple"

# ========== 3. 可选优化配置 ==========
# 关闭SSL校验（内网镜像才开，公网不要加）
# trusted-host = ["pypi.tuna.tsinghua.edu.cn", "mirrors.aliyun.com"]

# 全局并发下载数，国内宽带建议16~32
download-concurrency = 24

# 缓存清理自动阈值
cache-max-size = "10GB"
